apiVersion: apps/v1
kind: Deployment
metadata:
  name: flexbox-gateway
  namespace: flexbox
  labels:
    app: flexbox-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flexbox-gateway
  template:
    metadata:
      labels:
        app: flexbox-gateway
    spec:
      containers:
        - name: gateway
          image: flexbox/gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: FLEXBOX_HOST
              value: "0.0.0.0"
            - name: FLEXBOX_PORT
              value: "8080"
            - name: FLEXBOX_WORKERS
              value: "4"
            - name: FLEXBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: flexbox-secrets
                  key: api-key
          resources:
            requests:
              memory: "8Gi"
              cpu: "2"
            limits:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: adapters
              mountPath: /app/adapters
            - name: models
              mountPath: /app/models
      volumes:
        - name: adapters
          persistentVolumeClaim:
            claimName: flexbox-adapters-pvc
        - name: models
          persistentVolumeClaim:
            claimName: flexbox-models-pvc
      nodeSelector:
        accelerator: nvidia-gpu
---
apiVersion: v1
kind: Service
metadata:
  name: flexbox-gateway
  namespace: flexbox
spec:
  selector:
    app: flexbox-gateway
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flexbox-adapters-pvc
  namespace: flexbox
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flexbox-models-pvc
  namespace: flexbox
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: flexbox-secrets
  namespace: flexbox
type: Opaque
data:
  api-key: Y2hhbmdlbWU=  # base64 encoded
